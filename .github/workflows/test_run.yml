name: Test Run

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * TUE'

jobs:
  check-python-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: pre-commit/action@v3.0.1

  test-run:
    needs: [check-python-style]
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
        
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install ffmpeg
      if: runner.os == 'Linux'
      run: sudo apt update && sudo apt install -y ffmpeg

    - name: Install ffmpeg
      if: runner.os == 'macOS'
      run: brew install ffmpeg
    
    - name: Install ffmpeg
      if: runner.os == 'Windows'
      run: choco install ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip cython uv
        # This is to avoid installing cuda dependencies
        python -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
        uv pip install --system -c constraints.txt -r requirements.txt

    - name: Test with msdd diarizer
      run: |
        python diarize.py -a "./tests/assets/test.opus" --whisper-model tiny.en --diarizer msdd
